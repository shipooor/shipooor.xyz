<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>shipooor — hackathon speedrunner</title>
<meta name="description" content="shipooor — hackathon speedrunner. I ship while you sleep.">
<meta property="og:title" content="shipooor — hackathon speedrunner">
<meta property="og:description" content="I ship while you sleep.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://shipooor.xyz">
<meta name="twitter:card" content="summary">
<meta name="twitter:site" content="@shipooor">
<meta name="theme-color" content="#000000">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='72' font-family='monospace' font-weight='700' font-size='72' fill='white' text-anchor='middle'%3Es%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    z-index: 9999; pointer-events: none;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px;
  }

  #scroll-track {
    position: fixed; inset: 0;
    will-change: transform;
  }

  /* Screen 1: Manifesto */
  #screen-manifesto {
    width: 100%; height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }

  .block {
    width: min(88vw, 820px);
    display: flex; flex-direction: column; align-items: flex-start;
  }

  .m-line {
    font-family: 'Oswald', sans-serif;
    font-weight: 700; text-transform: uppercase;
    line-height: 0.95; letter-spacing: 0.02em;
    white-space: nowrap; user-select: none;
    color: #fff; opacity: 0;
    will-change: transform, opacity;
    font-size: 10px;
  }

  /* Screen 2: Final */
  #screen-final {
    width: 100%; height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  .final-name {
    user-select: none; opacity: 0;
  }
  .final-name-text {
    font-size: clamp(48px, 10vw, 120px);
    font-weight: 900; color: #fff;
    letter-spacing: -0.02em;
    transition: letter-spacing 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  .final-tagline {
    font-size: clamp(12px, 2vw, 18px); font-weight: 400;
    color: rgba(255,255,255,0.45); text-transform: uppercase;
    letter-spacing: 0.3em; margin-top: 12px; opacity: 0;
  }

  .final-links { display: flex; gap: 32px; margin-top: 48px; opacity: 0; }
  .final-links a {
    color: rgba(255,255,255,0.3); text-decoration: none;
    font-size: clamp(12px, 1.5vw, 15px); font-weight: 400;
    letter-spacing: 0.05em; transition: color 0.3s ease;
    display: flex; align-items: center; gap: 6px;
  }
  .final-links a:hover { color: rgba(255,255,255,0.8); }
  .final-links a .icon { width: 16px; height: 16px; opacity: 0.5; transition: opacity 0.3s; }
  .final-links a:hover .icon { opacity: 1; }

  .coming-soon {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    font-size: 11px; color: rgba(255,255,255,0.2);
    text-transform: uppercase; letter-spacing: 0.2em; z-index: 10; opacity: 0;
  }

  @keyframes subtlePulse {
    0%, 100% { text-shadow: 0 0 0px transparent; }
    50% { text-shadow: 0 0 40px rgba(255,255,255,0.06); }
  }
  .final-name.alive .final-name-text { animation: subtlePulse 4s ease-in-out infinite; }

  @keyframes subtleFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-2px); }
  }
  .final-tagline.alive { animation: subtleFloat 6s ease-in-out infinite; }
</style>
</head>
<body>

<div id="scroll-track">
  <!-- Screen 1: Manifesto -->
  <div id="screen-manifesto">
    <div class="block" id="block">
      <div class="m-line" id="m-row1">I SHIP</div>
      <div class="m-line" id="m-row2">WHILE YOU</div>
      <div class="m-line" id="m-row3">SLEEP</div>
    </div>
  </div>

  <!-- Screen 2: Identity -->
  <div id="screen-final">
    <div class="final-name" id="fname">
      <span class="final-name-text">shipooor</span>
    </div>
    <div class="final-tagline" id="ftagline">hackathon speedrunner</div>
    <div class="final-links" id="flinks">
      <a href="https://x.com/shipooor" target="_blank" rel="noopener">
        <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        @shipooor
      </a>
      <a href="https://github.com/shipooor" target="_blank" rel="noopener">
        <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
        GitHub
      </a>
    </div>
  </div>
</div>

<div class="coming-soon" id="csoon">coming soon</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
(() => {
  function fitLines() {
    const block = document.getElementById('block');
    const blockW = block.offsetWidth;
    block.querySelectorAll('.m-line').forEach(line => {
      line.style.letterSpacing = '0px';
      line.style.fontSize = '100px';
      const ratio = blockW / line.scrollWidth;
      line.style.fontSize = Math.floor(100 * ratio) + 'px';
      const gap = blockW - line.scrollWidth;
      const chars = line.textContent.replace(/\s/g, '').length;
      if (chars > 1 && gap > 0) line.style.letterSpacing = (gap / (chars - 1)) + 'px';
    });
  }

  document.fonts.ready.then(() => {
    fitLines();
    runAnimation();
  });
  window.addEventListener('resize', fitLines);

  function runAnimation() {
    const tl = gsap.timeline();
    const vh = window.innerHeight;

    tl.to({}, { duration: 1.0 });

    ['#m-row1', '#m-row2', '#m-row3'].forEach((sel, i) => {
      tl.fromTo(sel,
        { opacity: 0, y: 20 },
        { opacity: 1, y: 0, duration: 0.4, ease: 'power3.out' }
      );
      if (i < 2) tl.to({}, { duration: 0.5 });
    });

    tl.to({}, { duration: 1.8 });

    tl.to('#scroll-track', {
      y: -vh,
      duration: 1.2,
      ease: 'power2.inOut'
    });

    tl.fromTo('#fname',
      { opacity: 0 },
      { opacity: 1, duration: 0.5, ease: 'power1.out' },
      '-=0.6'
    );

    tl.call(() => {
      document.getElementById('fname').classList.add('alive');
    });

    tl.to('#ftagline', {
      opacity: 1,
      duration: 0.8,
      ease: 'power1.out'
    }, '-=0.2');

    tl.call(() => {
      document.getElementById('ftagline').classList.add('alive');
    });

    tl.to('#flinks', {
      opacity: 1,
      duration: 0.8,
      ease: 'power1.out'
    }, '-=0.4');

    tl.to('#csoon', {
      opacity: 1,
      duration: 0.6,
      ease: 'power1.out'
    }, '-=0.4');
  }
})();
</script>
</body>
</html>
